name: CD

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out a2a-ahp
        uses: actions/checkout@v4
        with:
          path: a2a-ahp

      - name: Check out ahp-provider-kit
        uses: actions/checkout@v4
        with:
          repository: wyrd-company/ahp-provider-kit
          path: ahp-provider-kit

      - name: Check out ahp-nats
        uses: actions/checkout@v4
        with:
          repository: wyrd-company/ahp-nats
          path: ahp-nats

      - name: Check out ahp-grpc
        uses: actions/checkout@v4
        with:
          repository: wyrd-company/ahp-grpc
          path: ahp-grpc

      - name: Check out ahp-codex-app-server
        uses: actions/checkout@v4
        with:
          repository: wyrd-company/ahp-codex-app-server
          path: ahp-codex-app-server

      - name: Check out ahp-server
        uses: actions/checkout@v4
        with:
          repository: wyrd-company/ahp-server
          path: ahp-server

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: |
            a2a-ahp/package-lock.json
            ahp-provider-kit/package-lock.json
            ahp-nats/package-lock.json
            ahp-grpc/package-lock.json
            ahp-codex-app-server/package-lock.json
            ahp-server/package-lock.json

      - name: Build local workspace dependencies
        run: |
          set -euo pipefail
          for package in \
            ahp-provider-kit \
            ahp-nats \
            ahp-grpc \
            ahp-codex-app-server \
            ahp-server
          do
            npm --prefix "$package" ci
            npm --prefix "$package" run build
          done

      - name: Install a2a-ahp
        run: npm ci
        working-directory: a2a-ahp

      - name: Set package version from SemVer tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $TAG is not a numeric SemVer release tag like 0.1.0"
            exit 1
          fi
          npm version --no-git-tag-version "$TAG"
        working-directory: a2a-ahp

      - run: npm run verify
        working-directory: a2a-ahp

      - name: Publish to npmjs.org
        run: npm publish --provenance --access public
        working-directory: a2a-ahp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@wyrd-company'

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com
        working-directory: a2a-ahp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        run: |
          title="$(node -p "require('./package.json').name + '@' + require('./package.json').version")"
          gh release create "${GITHUB_REF_NAME}" --title "$title" --generate-notes
        working-directory: a2a-ahp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
